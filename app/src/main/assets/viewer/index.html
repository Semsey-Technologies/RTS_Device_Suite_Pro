<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>View Backups</title>
    <style>
        :root {
            --bg: #0A0F1A;
            --nav-bg: #1e2533;
            --accent: #00BFFF;
            --text: #ffffff;
            --sidebar-bg: #151b2b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            background-color: var(--nav-bg);
            height: 60px;
            border-bottom: 2px solid var(--accent);
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .nav-item {
            padding: 0 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .nav-item.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background-color: rgba(0, 191, 255, 0.1);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #search-input {
            width: 100%;
            padding: 12px 16px;
            background: #232d42;
            border: 1px solid #303c55;
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .content-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
            position: relative;
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
        }

        .viewer-display {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Test Content Visibility */
        .test-banner {
            background: var(--accent);
            color: #000;
            padding: 5px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="test-banner">RECOVERY TOOLS SUITE PRO - BACKUP VIEWER ACTIVE</div>
    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="nav-item active" data-category="messages">Text</div>
            <div class="nav-item" data-category="contacts">Contacts</div>
            <div class="nav-item" data-category="pictures">Pictures</div>
            <div class="nav-item" data-category="videos">Videos</div>
            <div class="nav-item" data-category="audio">Music</div>
            <div class="nav-item" data-category="documents">Documents</div>
        </nav>

        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <input type="text" id="search-input" placeholder="Search backups...">
                </div>
                <div id="sidebar-content" class="sidebar-content">
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <div>No threads found</div>
                    </div>
                </div>
            </aside>

            <main class="content-viewer">
                <header class="content-header">
                    <h2 id="current-title">Text Messages</h2>
                </header>
                <div id="viewer-display" class="viewer-display">
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>Select a conversation to view messages</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Script loading removed temporarily for pure layout test -->
    <script>
        console.log("Static layout loaded successfully");
        // Simple click handlers for visual feedback during test
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('current-title').innerText = item.innerText;
            };
        });
    </script>
</body>
</html>
