<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Backup Viewer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <button id="exit-button" title="Close Viewer">&times;</button>
            <h1 id="header-title">RTS Backup Suite</h1>
            <div id="header-actions">
                <button id="import-button" title="Import Archive">📥</button>
                <button id="export-button" title="Export Archive">📤</button>
                <button id="home-button" title="Home">🏠</button>
                <button id="back-button" title="Back">&larr;</button>
            </div>
        </header>

        <nav id="quick-nav">
            <div class="nav-links">
                <a href="#" data-section="sms" title="Messages">💬</a>
                <a href="#" data-section="calls" title="Calls">📞</a>
                <a href="#" data-section="contacts" title="Contacts">👤</a>
                <a href="#" data-section="images" title="Images">🖼️</a>
                <a href="#" data-section="videos" title="Videos">🎥</a>
                <a href="#" data-section="files" title="Files">📁</a>
            </div>
        </nav>

        <main id="main-content">
            <!-- Content will be dynamically loaded here -->
        </main>
    </div>
    <script src="assets/js/viewer.js"></script>
</body>
</html>
